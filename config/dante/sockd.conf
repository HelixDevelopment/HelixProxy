# Dante SOCKS Proxy Configuration
# Tracked source config — mounted read-only into proxy-dante (no runtime generator).
# Edit here; changes apply on a container recreate (./stop && ./start).

# Logging
logoutput: /var/log/sockd.log

# Internal interface (clients connect here)
internal: 0.0.0.0 port = 51080

# External interface (outgoing connections)
# Use container name instead of interface name - resolves via internal DNS
# in bridge networks where interface names are not resolvable
external: proxy-dante

# Authentication methods (none for simplicity)
socksmethod: none

# Access Rules - allow all local and private network clients
client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
}

# SSRF hardening (§11.4.169 security): a VPN-egress SOCKS5 proxy must NEVER be
# usable to reach internal / link-local / loopback destinations. Dante evaluates
# socks rules top-down, first match wins — so these BLOCK rules MUST precede the
# pass. Without them dante forwards a client CONNECT to 169.254.169.254 (cloud
# metadata) or RFC1918 (SSRF). Public destinations still pass below.
socks block {
    from: 0.0.0.0/0 to: 127.0.0.0/8
    log: connect
}
socks block {
    from: 0.0.0.0/0 to: 169.254.0.0/16
    log: connect
}
socks block {
    from: 0.0.0.0/0 to: 10.0.0.0/8
    log: connect
}
socks block {
    from: 0.0.0.0/0 to: 172.16.0.0/12
    log: connect
}
socks block {
    from: 0.0.0.0/0 to: 192.168.0.0/16
    log: connect
}

# Allow outgoing CONNECT to any (public) destination. command: connect only —
# BIND / UDP-associate are not needed for the forward-proxy use case (§11.4.169).
socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: connect
    log: connect
}
