# =============================================================================
# Helix Proxy — Squid base config for the DYNAMIC (VPN-aware) profile
# =============================================================================
# FAIL-CLOSED BY DEFAULT (§11.4.108 / security defect P10). This is a
# dynamic-mode variant of config/squid/squid.conf. The differences from the
# static base — and ONLY these — exist so a client request CANNOT egress unless
# a valid, compiler-rendered tunnel config is present AND its tunnel is up:
#
#   1. There is NO unconditional `http_access allow localnet`. In the static
#      base that line allows every LAN client BEFORE any VPN check, which makes
#      the fail-closed rules in the rendered include unreachable (first-match-
#      wins) and — when no include is present — lets squid egress DIRECTLY.
#      The client-allow now lives INSIDE the compiler-rendered include, gated
#      AFTER `http_access deny !tun_up`, so it is reached ONLY when the tunnel
#      for the request is up.
#
#   2. The `include /etc/squid/conf.d/*.squid` line is placed BEFORE the terminal
#      `http_access deny all`, so the rendered `http_access deny !tun_up` (and
#      the gated `allow localnet` after it) are evaluated. With NO include
#      present (compiler failed / not yet run) the request falls straight
#      through to `deny all` → branded 503, NEVER a direct egress leak.
#
#   3. `error_directory` is pinned so `deny_info 503:ERR_TUNNEL_DOWN` resolves
#      the baked branded page (config/squid/errors/ERR_TUNNEL_DOWN, copied into
#      the image error dir by Containerfile.dynamic). Pinning also disables
#      language negotiation so the branding is deterministic (§11.4.6).
#
# The STATIC config/squid/squid.conf is UNTOUCHED (§11.4.122) — it keeps serving
# the non-dynamic (`./start --no-vpn` / vpn / host-vpn) proxy exactly as before.
# =============================================================================

# Network Settings
http_port 0.0.0.0:53128

# Cache Directory Configuration
cache_dir aufs /var/spool/squid 51200 16 256
cache_mem 512 MB

# Object Size Limits
maximum_object_size 100 MB
minimum_object_size 1 KB
maximum_object_size_in_memory 4 MB

# Cache Replacement Policy
cache_replacement_policy lru
memory_replacement_policy lru

# Access Control Lists
acl localnet src 0.0.0.1-0.255.255.255
acl localnet src 10.0.0.0/8
acl localnet src 100.64.0.0/10
acl localnet src 127.0.0.0/8
acl localnet src 169.254.0.0/16
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

# SSL/TLS Ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777

# CONNECT method ACL
acl CONNECT method CONNECT

# Branded fail-closed error page (deny_info 503:ERR_TUNNEL_DOWN resolves here).
# Pinned dir → deterministic branding + no language negotiation (§11.4.6).
error_directory /usr/share/squid/errors/English

# Access Rules
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager
# NOTE (§11.4.108 fail-closed): NO unconditional `http_access allow localnet`
# here. The gated client-allow lives in the compiler-rendered include below,
# AFTER `http_access deny !tun_up`. localhost stays allowed (squid mgmt / health).
http_access allow localhost
# Dynamic-routing include (compiler-rendered at runtime; §11.4.122 additive).
# MUST sit BEFORE `http_access deny all`: it contributes
# `http_access deny !tun_up` (tunnel down → branded 503) then the gated
# `http_access allow localnet` (tunnel up → permitted). With NO matching include
# present the request falls through to `deny all` → fail-closed.
#
# POSITIVE ALLOW-LIST GLOB `*.squid` (§11.4.108 RC-4 fix): NOT `*.conf`. The
# ubuntu/squid base image ships `/etc/squid/conf.d/debian.conf` carrying an
# UNCONDITIONAL `http_access allow localnet` — a `*.conf` glob pulls it in and it
# sorts BEFORE the compiler's include, defeating `deny !tun_up` and leaking direct
# egress. The compiler-rendered squid include is written with a `.squid` suffix
# (compose `--squid-out …/dynamic-routing.squid`), so `*.squid` matches ONLY it —
# never debian.conf/rock.conf, and never the Dante `*.sockd.conf` / `proxy.pac`
# that share the generated volume (which would otherwise break `squid -k parse`).
# A wildcard glob with ZERO matches (compiler not run) is NOT a fatal error in
# Squid — it contributes nothing, so the request falls through to `deny all`.
include /etc/squid/conf.d/*.squid
http_access deny all

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
cache_store_log /var/log/squid/store.log
logfile_rotate 5

# PID file
pid_filename /var/run/squid/squid.pid

# Coredump directory
coredump_dir /var/spool/squid

# Refresh Patterns
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern .               0       20%     4320

# DNS Configuration
dns_nameservers 8.8.8.8 8.8.4.4
positive_dns_ttl 3600 seconds
negative_dns_ttl 30 seconds

# Performance Tuning
server_persistent_connections on
client_persistent_connections on
half_closed_clients off
