# Route-execution slice of tools/helixqa/banks/proxy.yaml — Squid cache.
# Runner drives this via: helixqa http --bank <this> \
#   --base-url http://www.gnu.org   (HTTP_PROXY=http://127.0.0.1:34128)
# The two http: steps prove the cacheable object is served consistently
# THROUGH the proxy (functional). The runner then captures the DECISIVE cache
# evidence sink-side: a Squid TCP_*HIT for this URL in proxy-squid's
# access.log (mirrors tests/comprehensive-test.sh assert_cache_hit) plus
# ./cachectl stats. HTTPS bodies are never cacheable by Squid, so the target
# is deliberately plain HTTP.
version: "1.0"
name: "helix_proxy route: Squid cache (:34128)"
description: "Cache warm+verify cases; base-url http://www.gnu.org via HTTP_PROXY=http://127.0.0.1:34128. HIT proven sink-side by the runner."
test_cases:
  - id: PRX-CACHE-001
    name: "Cache warm: first GET of a cacheable object is served (MISS)"
    category: performance
    priority: high
    platforms: [desktop]
    steps:
      - name: "Warm GET of cacheable image through the proxy"
        action: "http: GET /graphics/heckert_gnu.transp.small.png"
        expected: "200 with the PNG body; object now stored"
        expect_status: 200
  - id: PRX-CACHE-002
    name: "Cache verify: second GET of the same object is served"
    category: performance
    priority: critical
    platforms: [desktop]
    steps:
      - name: "Repeat GET of the same cacheable image through the proxy"
        action: "http: GET /graphics/heckert_gnu.transp.small.png"
        expected: "200 served again; runner confirms Squid TCP_*HIT in access.log"
        expect_status: 200
